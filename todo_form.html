<!-- todo_form.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 2rem;
            background-color: #f9f9f9;
        }
        form {
            background-color: #fff;
            padding: 1.5rem;
            border-radius: 8px;
            max-width: 400px;
            box-shadow: 0 0 8px rgba(0,0,0,0.1);
        }
        input[type="text"] {
            display: block;
            width: 100%;
            margin-bottom: 1rem;
            padding: 0.5rem;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            background-color: #007bff;
            color: #fff;
            border: none;
            padding: 0.6rem 1.2rem;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <h1>Create To-Do Item</h1>
    <form action="/submittodoitem" method="POST">
        <input type="text" name="itemName" placeholder="Item Name" required>
        <input type="text" name="itemDescription" placeholder="Item Description" required>
        <button type="submit">Submit</button>
    </form>
</body>
</html>
<form action="/submittodoitem" method="POST">
    <input type="text" name="itemId" placeholder="Item ID" required>
    <input type="text" name="itemUUID" placeholder="Item UUID">
    <input type="text" name="itemHash" placeholder="Item Hash">
    <input type="text" name="itemName" placeholder="Item Name" required>
    <input type="text" name="itemDescription" placeholder="Item Description" required>
    <button type="submit">Submit</button>
</form>
